version: 1
backend:
  phases:
    preBuild:
      commands:
        - npm ci
        - pip install -r amplify/functions/brain/layer/requirements.txt -t amplify/functions/brain/layer/python
    build:
      commands:
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
